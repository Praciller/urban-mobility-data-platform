name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.21"

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Check repository guardrails
        run: uv run python scripts/check_repo_guardrails.py

      - name: Check repository readiness
        run: uv run python scripts/check_repo_readiness.py

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest

      - name: Run bounded offline demo
        env:
          DATA_DIR: ${{ runner.temp }}/urban-mobility-demo
        run: uv run python scripts/run_demo.py --data-dir "$DATA_DIR"

      - name: Validate Compose configuration
        run: docker compose config

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci --prefix apps/web

      - name: Test frontend
        run: npm --prefix apps/web test -- --run

      - name: Typecheck frontend
        run: npm --prefix apps/web run lint

      - name: Build frontend
        run: npm --prefix apps/web run build
